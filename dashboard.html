<!DOCTYPE html>
<html lang="fr">
<head>
 <meta charset="UTF-8" />
  <base href="/">
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>YZA Dashboard</title>
 <meta name="robots" content="noindex,nofollow" />
 <meta name="description" content="Local YZA analytics and inventory dashboard." />
 <link rel="icon" href="assets/brand/yza-favicon.png" type="image/png" />
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300..700;1,400..600&family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="css/tokens.css?v=20260702e" />
 <link rel="stylesheet" href="css/styles.css?v=20260702e" />
 <style>
  body { background: var(--paper); color: var(--color-fg); }
  .dash { padding: clamp(1rem, 3vw, 2rem); }
  .dash__top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem; }
  .dash h1 { font-size: clamp(2rem, 6vw, 4.4rem); line-height: 0.9; text-transform: uppercase; margin: 0; }
  .dash__actions { display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: flex-end; }
  .dash__grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
  .dash__metric { border: 1px solid var(--color-border); background: var(--paper-card); padding: 1rem; }
  .dash__metric span { display: block; font-family: var(--font-mono); font-size: 0.68rem; text-transform: uppercase; color: var(--color-muted); }
  .dash__metric strong { display: block; margin-top: 0.35rem; font-size: 1.7rem; }
  .dash__panel { border: 1px solid var(--color-border); background: var(--paper-card); margin-bottom: 1rem; }
  .dash__panel h2 { font-size: 1rem; font-style: normal; text-transform: uppercase; padding: 1rem; border-bottom: 1px solid var(--color-border); }
  .dash__table-wrap { overflow: auto; max-height: 520px; }
  .dash table { width: 100%; border-collapse: collapse; min-width: 760px; }
  .dash th, .dash td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--color-border); text-align: left; vertical-align: middle; }
  .dash th { font-family: var(--font-mono); font-size: 0.66rem; text-transform: uppercase; color: var(--color-muted); position: sticky; top: 0; background: var(--paper-card); z-index: 1; }
  .dash input, .dash select { width: 100%; border: 1px solid var(--color-border); background: var(--white); padding: 0.65rem; font: inherit; }
  .dash .btn { min-height: 40px; }
  .dash__gate { min-height: 100vh; display: grid; place-items: center; padding: 1rem; }
  .dash__gate-card { width: min(420px, 100%); border: 1px solid var(--color-border); background: var(--paper-card); padding: 1.5rem; }
  .dash__gate-card h1 { font-size: 2.4rem; line-height: 0.9; text-transform: uppercase; margin-bottom: 1rem; }
  .dash__gate-card form { display: grid; gap: 0.75rem; }
  .dash__status { font-family: var(--font-mono); font-size: 0.68rem; text-transform: uppercase; color: var(--color-muted); }
  .dash__filters { display: grid; grid-template-columns: minmax(180px, 1fr) 180px; gap: 0.75rem; padding: 1rem; border-bottom: 1px solid var(--color-border); }
  .dash__muted { color: var(--color-muted); }
  @media (max-width: 920px) { .dash__grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .dash__top { display: grid; } .dash__actions { justify-content: flex-start; } }
  @media (max-width: 620px) { .dash__grid, .dash__filters { grid-template-columns: 1fr; } }
 </style>
</head>
<body data-page="dashboard">
<main id="gate" class="dash__gate" hidden>
 <section class="dash__gate-card">
  <p class="eyebrow">YZA</p>
  <h1>Dashboard</h1>
  <form id="gateForm">
   <label>
    <span class="sr-only">Access code</span>
    <input id="gateCode" type="password" autocomplete="current-password" placeholder="Access code" />
   </label>
   <button class="btn btn--accent btn--block" type="submit">Unlock</button>
   <p class="dash__status" id="gateMsg" hidden>Wrong code.</p>
  </form>
 </section>
</main>

<main id="dash" class="dash" hidden>
 <div class="dash__top">
  <div>
   <p class="eyebrow">YZA Admin</p>
   <h1>Dashboard</h1>
   <p class="dash__status" id="freshness">Local browser data</p>
  </div>
  <div class="dash__actions">
   <a class="btn btn--ghost" href="/">Public site</a>
   <button class="btn btn--ghost" id="exportEvents" type="button">Export events</button>
   <button class="btn btn--ghost" id="exportInventory" type="button">Export inventory CSV</button>
   <button class="btn btn--ghost" id="clearAnalytics" type="button">Clear analytics</button>
   <button class="btn btn--ghost" id="lockDash" type="button">Lock</button>
  </div>
 </div>

 <section class="dash__grid" aria-label="Analytics summary">
  <div class="dash__metric"><span>Sessions</span><strong id="metricSessions">0</strong></div>
  <div class="dash__metric"><span>Page views</span><strong id="metricViews">0</strong></div>
  <div class="dash__metric"><span>Events</span><strong id="metricEvents">0</strong></div>
  <div class="dash__metric"><span>Inventory overrides</span><strong id="metricOverrides">0</strong></div>
 </section>

 <section class="dash__panel">
  <h2>Top product funnel</h2>
  <div class="dash__table-wrap">
   <table>
    <thead><tr><th>Product</th><th>Views</th><th>Adds</th><th>Checkouts</th><th>Rate</th></tr></thead>
    <tbody id="funnelRows"></tbody>
   </table>
  </div>
 </section>

 <section class="dash__panel">
  <h2>Inventory</h2>
  <div class="dash__filters">
   <input id="inventorySearch" type="search" placeholder="Search product, SKU, category" />
   <select id="inventoryFilter" aria-label="Inventory filter">
    <option value="all">All products</option>
    <option value="overrides">With overrides</option>
    <option value="low">Low or sold out</option>
   </select>
  </div>
  <div class="dash__table-wrap">
   <table>
    <thead><tr><th>Product</th><th>SKU</th><th>Category</th><th>Base</th><th>Override</th><th>Effective</th><th>Status</th></tr></thead>
    <tbody id="inventoryRows"></tbody>
   </table>
  </div>
 </section>

 <section class="dash__panel">
  <h2>Recent events</h2>
  <div class="dash__table-wrap">
   <table>
    <thead><tr><th>Time</th><th>Event</th><th>Page</th><th>Handle</th><th>Source</th></tr></thead>
    <tbody id="eventRows"></tbody>
   </table>
  </div>
 </section>
</main>

<script defer src="js/products.js?v=20260702e"></script>
  <script defer src="js/tracking.js?v=20260702e"></script>
<script defer src="js/i18n.js?v=20260702e"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const ACCESS_CODE_HASH = 'e6c7dd9f4b62c5a0e65e0abfd2f35dc6f2a24eda8b4103c5885f428ee6a5d605';
  const keys = {
    events: 'yza_events',
    counters: 'yza_counters',
    overrides: 'yza_inventory_overrides',
    unlocked: 'yza_dashboard_unlocked',
  };
  const $ = (selector) => document.querySelector(selector);
  const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
  const readJson = (key, fallback) => {
    try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch (err) { return fallback; }
  };
  const writeJson = (key, value) => localStorage.setItem(key, JSON.stringify(value));
  const sha256 = async (value) => {
    const bytes = new TextEncoder().encode(value);
    const digest = await crypto.subtle.digest('SHA-256', bytes);
    return Array.from(new Uint8Array(digest)).map((byte) => byte.toString(16).padStart(2, '0')).join('');
  };
  const download = (name, type, body) => {
    const blob = new Blob([body], { type });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = name;
    link.click();
    URL.revokeObjectURL(url);
  };
  const formatName = (product) => {
    const value = product?.displayName || product?.name || {};
    return value.en || value.fr || product?.handle || '';
  };
  const products = () => (window.YZA?.products || []).filter((product) => product.publicVisible !== false);
  const baseInventory = (product) => product.inventory === null || typeof product.inventory === 'undefined' ? null : Number(product.inventory);
  const effectiveInventory = (product, overrides) => {
    const base = baseInventory(product);
    if (base === null) return overrides[product.handle] === undefined ? null : Number(overrides[product.handle]);
    return Math.max(0, base + Number(overrides[product.handle] || 0));
  };
  const stockStatus = (value) => {
    if (value === null) return 'Count TBC';
    if (value === 0) return 'Sold out';
    if (value <= 5) return 'Low stock';
    return 'Available';
  };

  function render() {
    const events = readJson(keys.events, []);
    const counters = readJson(keys.counters, {});
    const overrides = readJson(keys.overrides, {});
    $('#metricSessions').textContent = counters.total_sessions || 0;
    $('#metricViews').textContent = counters.total_page_views || 0;
    $('#metricEvents').textContent = events.length;
    $('#metricOverrides').textContent = Object.keys(overrides).length;
    $('#freshness').textContent = counters.last_seen ? `Last event ${new Date(counters.last_seen).toLocaleString()}` : 'No tracked events in this browser yet';

    const funnel = counters.funnel_by_handle || {};
    $('#funnelRows').innerHTML = Object.entries(funnel)
      .sort((a, b) => (b[1].views + b[1].cart_adds * 2 + b[1].checkouts * 3) - (a[1].views + a[1].cart_adds * 2 + a[1].checkouts * 3))
      .slice(0, 30)
      .map(([handle, row]) => {
        const product = window.YZA?.getProduct?.(handle);
        const views = row.views || 0;
        const adds = row.cart_adds || 0;
        const rate = views ? Math.round((adds / views) * 100) + '%' : '0%';
        return `<tr><td>${esc(formatName(product) || handle)}</td><td>${views}</td><td>${adds}</td><td>${row.checkouts || 0}</td><td>${rate}</td></tr>`;
      }).join('') || '<tr><td colspan="5" class="dash__muted">No funnel events yet.</td></tr>';

    renderInventory();
    $('#eventRows').innerHTML = events.slice(-80).reverse().map((event) => (
      `<tr><td>${esc(event.timestamp || '')}</td><td>${esc(event.event || '')}</td><td>${esc(event.path || event.page || '')}</td><td>${esc(event.handle || '')}</td><td>${esc(event.source || '')}</td></tr>`
    )).join('') || '<tr><td colspan="5" class="dash__muted">No events yet.</td></tr>';
  }

  function renderInventory() {
    const overrides = readJson(keys.overrides, {});
    const q = ($('#inventorySearch').value || '').toLowerCase();
    const filter = $('#inventoryFilter').value || 'all';
    const rows = products().filter((product) => {
      const effective = effectiveInventory(product, overrides);
      const haystack = [formatName(product), product.sku, product.category, product.handle].join(' ').toLowerCase();
      if (q && !haystack.includes(q)) return false;
      if (filter === 'overrides' && overrides[product.handle] === undefined) return false;
      if (filter === 'low' && !(effective !== null && effective <= 5)) return false;
      return true;
    });
    $('#inventoryRows').innerHTML = rows.map((product) => {
      const base = baseInventory(product);
      const overrideValue = overrides[product.handle] ?? '';
      const effective = effectiveInventory(product, overrides);
      return `<tr>
        <td><a href="produit.html?handle=${encodeURIComponent(product.handle)}">${esc(formatName(product))}</a><br><span class="dash__muted">${esc(product.handle)}</span></td>
        <td>${esc(product.sku || '')}</td>
        <td>${esc(product.category || '')}</td>
        <td>${base === null ? 'TBC' : base}</td>
        <td><input data-stock-handle="${esc(product.handle)}" type="number" step="1" value="${esc(overrideValue)}" placeholder="TBC" /></td>
        <td>${effective === null ? 'TBC' : effective}</td>
        <td>${stockStatus(effective)}</td>
      </tr>`;
    }).join('') || '<tr><td colspan="7" class="dash__muted">No products match this filter.</td></tr>';
  }

  function showDashboard() {
    $('#gate').hidden = true;
    $('#dash').hidden = false;
    render();
  }

  if (localStorage.getItem(keys.unlocked) === '1') {
    showDashboard();
  } else {
    $('#gate').hidden = false;
  }

  $('#gateForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const inputHash = await sha256(($('#gateCode').value || '').trim());
    if (inputHash === ACCESS_CODE_HASH) {
      localStorage.setItem(keys.unlocked, '1');
      showDashboard();
    } else {
      $('#gateMsg').hidden = false;
    }
  });

  $('#lockDash').addEventListener('click', () => {
    localStorage.removeItem(keys.unlocked);
    location.reload();
  });
  $('#inventoryRows').addEventListener('change', (event) => {
    const input = event.target.closest('[data-stock-handle]');
    if (!input) return;
    const overrides = readJson(keys.overrides, {});
    if (input.value === '') delete overrides[input.dataset.stockHandle];
    else overrides[input.dataset.stockHandle] = Number(input.value);
    writeJson(keys.overrides, overrides);
    render();
  });
  $('#inventorySearch').addEventListener('input', renderInventory);
  $('#inventoryFilter').addEventListener('change', renderInventory);
  $('#clearAnalytics').addEventListener('click', () => {
    if (!confirm('Clear local YZA analytics for this browser?')) return;
    localStorage.removeItem(keys.events);
    localStorage.removeItem(keys.counters);
    render();
  });
  $('#exportEvents').addEventListener('click', () => {
    download('yza-events.json', 'application/json', JSON.stringify(readJson(keys.events, []), null, 2));
  });
  $('#exportInventory').addEventListener('click', () => {
    const overrides = readJson(keys.overrides, {});
    const header = ['handle', 'sku', 'name', 'category', 'base_inventory', 'override', 'effective', 'status'];
    const lines = products().map((product) => {
      const base = baseInventory(product);
      const effective = effectiveInventory(product, overrides);
      return [product.handle, product.sku || '', formatName(product), product.category || '', base ?? '', overrides[product.handle] ?? '', effective ?? '', stockStatus(effective)]
        .map((cell) => `"${String(cell).replace(/"/g, '""')}"`).join(',');
    });
    download('yza-inventory.csv', 'text/csv', [header.join(','), ...lines].join('\n'));
  });
});
</script>
</body>
</html>
